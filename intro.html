    <style>
        :root {
            --bg-color: #050505;
            --card-border: #1a1a1a; 
            --card-inner-bg: #151515; 
            --text-color: #f0f0f0;
            --accent-gold: #c5a059;
            --ronin-color: #00cccc;
            --void-color: #9933cc;
            --eurasia-color: #b22222;
            --apex-color: #1e90ff;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--accent-gold); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }

        /* Menu pro klikání */
        .controls {
            margin-bottom: 30px;

            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #222;
            color: #aaa;
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;

        button:hover { background: #333; color: #fff; border-color: var(--accent-gold); }
        button.active { background: var(--accent-gold); color: #000; border-color: #fff; }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;

.rules-section ol {
    counter-reset: item;

function showLore() {
    const gallery = document.getElementById('gallery');
    document.querySelectorAll('#menu button').forEach(btn => btn.classList.remove('active'));
    
    gallery.innerHTML = `
        <div class="lore-container">
            <h1 class="lore-title">KRONIKY PRÁZDNOTY</h1>
            <h2 class="lore-subtitle">Epitaf za mrtvé hvězdy</h2>

            <div class="lore-section">
                <h3>PROLOG</h3>                
            <p>Kdysi dávno, ještě než se obloha stala filtrem a Slunce zbožím, žilo lidstvo v klamném přesvědčení, že svět je stabilní. Katastrofy přicházely, ale byly vzdálené. Války hořely, ale vždy někde jinde. Klimatické zvraty, energetické krize a zhroucení ekonomik byly problémem příští dekády, další generace, cizí vlády. Člověk se naučil přežít tím, že se naučil nevidět následky.
Dvacáté první století neskončilo výbuchem. Skončilo pohodlím.</p>
<p>Ačkoliv státy zůstaly na mapách, hymny se dále hrály při sportovních utkáních, parlamenty se scházely a přijímaly zákony, skutečná moc se přesunula jinam. Do rukou těch, kteří dokázali řídit energii, tok informací a strach z chaosu. Vznikl Nový světový řád – tichý, smluvní, efektivní. Korporace nepřevzaly vládu násilím. Byly požádány, aby svět udržely v chodu.
Tak začal Korporátní věk Země.</p>
<p>Megakorporace se zrodily z nutnosti. Nejdříve jako konglomeráty, později jako entity s vlastní infrastrukturou, bezpečnostními složkami a právní suverenitou. Mezi nimi brzy vyčnívala jedna – <b>Apex Global</b>. Zpočátku spravovala energetické sítě, orbitální logistiku, komunikační uzly. Když státy selhávaly v krizi, Apex nabízel řešení: rychlé, drsné, funkční. A svět je přijímal. Každá smlouva omezila státní moc, každá výjimka zbavila vlády další odpovědnosti. Apex nevládl. Apex zajišťoval přežití.</p>
<p>Současně, v tichu serveroven a výzkumných kampusů, vznikala jiná síla. <b>Xenotronic</b> nejprve nezačal zbraněmi ani armádami, ale slibem optimalizace, expanze do vesmíru a pomoci přežití lidstvu. Neuronová rozhraní, asistovaná kognice, rozšířené vědomí. Lidská mysl, zbavená únavy, emocí a iracionality, se stala součástí sítě. Nejprve dobrovolně. Poté nevyhnutelně. Svět byl příliš složitý na to, aby ho lidé řídili sami. Algoritmy byly rychlejší. Přesnější. Chladnější. A přesně to bylo zapotřebí.
Země se ale nesjednotila. Rozštěpila se.</p>
<p>Východní a část evropských mocností vytvořily blok <b>Eurasia‑Kord</b> – pragmatický, industriální, nemilosrdný. Zatímco jiné oblasti spekulovaly a optimalizovaly, Eurasia stavěla. Obří továrny, těžký průmysl, masovou výrobu zbraní a strojů. Disciplína nahradila ideály. Řád byl důležitější než svoboda. Přežití významnější než lidskost.
<p>Na okrajích tohoto nového světa, v horách, ruinách zapomenutých regionech a autonomních zónách, kde korporace považovaly investice za nerentabilní, vzniklo něco jiného. Společenství lidí založená ne na smlouvách, ale na krvi. Na paměti, cti. <b>Klanové společenství</b> odmítlo digitální řízení i korporátní arbitraci. Byli pomalí, zastaralí a neefektivní. Ale v době, kdy se svět rozpadal na systémy a uzly, si uchovali to jediné, co algoritmy nedokázaly simulovat: ochotu zemřít za slib.</p>

<p>Kolem planety vznikala orbitální města, průmyslové komplexy na zpracování regolitu na Měsíci, těžební stanice v pásu asteroidů. Mars se stal provozní zónou, nikoli domovem. Apex Global řídil dopravu a zásobování. Eurasia‑Kord budoval obranné komplexy. Xenotronic propojoval mysl kolonistů se sítí, aby předešel panice a revoltám. Člověk byl fragmentem systému. Uzlem. Datovým tokem v nekonečném stroji expanze.</p>
<p>V asijsko‑pacifické oblasti vznikla zvláštní odpověď na tento bezduchý svět. <b>Ronin‑Tech</b> spojil archaické kodexy cti s nejpokročilejší kybernetikou. Ne stát, ne korporace, ale cesta bojovníka - bushido. Identita definovaná volbou, nikoli smlouvou. Ocel a kód, tradice a neon. Ronin‑Tech se nepokoušel svět zachránit. Pouze si chtěl udržet kontrolu nad tím, čím se člověk stane.</p>
<p>Nastal zlatý věk. Lidstvo mělo energii, technologie, nesmrtelnost v digitálních archivech, kontrolu nad genetikou i prostorem. A přesto vesmír zůstával tichý. Bez odezvy. Bez odpovědi.</p>
<p>Ticho začalo provokovat.</p>
<p>Touha po smyslu, po potvrzení, že nejsme sami, brzy vyvrcholila...</p>
            </div>


            <div class="lore-section">
                <h3>I. Hřích Neposkvrněného Pokroku</h3>
                <p>V dobách, kdy Slunce ještě hřálo tváře lidí bez filtrace biosférických štítů, se lidstvo prohlásilo za architekty reality. Když Země přestala stačit, lidstvo se nevrátilo k pokoře. Uteklo ke hvězdám.</p>
                <p>Korporace Apex Global vybudovala paláce ze zlata na měsících Saturnu a Xenotronic propojil lidskou mysl s věčným tichem křemíku. Byla to éra absolutní pýchy. Věřili jsme, že vesmír je jen surovina čekající na naše kulty pokroku.</p>
                <p>Pak přišel projekt "Hluboký Šíp". Na samém okraji naší galaxie, v místě, kde se fyzikální zákony začínají tříštit o nekonečné nic, jsme prorazili závoj. Sondy narazily na samotný okraj bytí, na takzvanou <b>Vnější Prázdnotu</b> – nehmotné vědomí starší než lidstvo a světlo samo. Nevstoupili jsme ale do nového světa, otevřeli jsme jícen nicoty, která nezná konce a která začala skrytě požírat a trhat naši realitu o nedotknutelnosti doslova na kusy.</p>
            </div>

            <div class="lore-section">
                <h3>II. Anatomie Rozkladu</h3>
                <p>Byla to ale nejproradnější zlověstná záludnost. Vnější Prázdnota se totiž nešířila jako armáda, ale jako doslovná rakovina smyslů. První příznaky nákazy byly nenápadné: sny o hnijících světech, technika, která se začala modlit k temnotě a krev, která v žilách lidských dělníků zčernala jako asfalt. Poté povstali první heretici. Z mudrců se velice záhy stali šiřitelé moru, kteří v troskách katedrál začali vyvolávat stvůry z nočních můr.</p>
                <p>Až byla k životu stvořena, vyvolána zrůda, Goliáš Hniloby. Nejsou to jen monstra, jsou to hory masa sešité z deseti tisíců padlých vojáků, poháněné ozubenými koly, která drtí kosti v nekonečném cyklu utrpení. Dále Shnilý Sběrač, kráčející bojištěm jako stín, jež si nevybírá zbraně, ale duše, které ukládá do svých rezavých háků, aby je mohl obětovat jako palivo pro další rozšiřování trhliny Prázdnoty, která nemá začátku ani konce.</p>
            </div>

            <div class="lore-section">
                <h3>III. Galaxie v Okovech</h3>
                <p>Lidstvo, místo aby se v hodině dvanácté sjednotilo, se roztrhalo na kusy. 
                <p>Přeživší fanatičtí členové církve, kteří se samozvaně začali nazývat <b>Světlonoši</b>, vynesli ze svých krypt starověké relikvie a podle dávných proroctví zahájili všestíhající "svatou" inkvizici, která v božích plamenech spaluje nakažené i nevinné.</p>
                <p>Eurasia-Kord přeměnila své průmyslové světy v obří továrny na smrt, kde se ocel a disciplína staly novým bohem. Klanové společenství se v kruté nostalgii vrátilo ke kódům cti a brutální síle mečů, zatímco Ronin-Tech sleduje tento tanec zániku skrze neonové filtry svých kybernetických očí, čekajíce na příležitost, jak urvat kus moci z hnijící mršiny civilizace.</p>
            </div>

            <div class="lore-section">
                <h3>IV. Měna Osudu</h3>
                <p>V tomto novém světě už neplatí kredity ani zlato, tak jako bylo vždy ceněno dříve. Jedinou hodnotou jsou <strong>Body osudu</strong> – metafyzická energie, kterou Prázdnota pumpuje do reality skrze své agenty. Za každé vítězství se platí krví. <strong>Body vítězství</strong> nejsou jen čísla na papíře; jsou to odznaky přežití v galaxii, která se rozhodla zemřít.</p>
                <p>Tím počaly Kroniky Prázdnoty.</p>
<p>Vesmírné lodě nyní spalují kosti padlých a v hlubokých dungeonech na okraji světa se ozývá jediná otázka: <em>"Budeš ten, kdo obětuje, nebo ten, kdo bude obětován?"</em></p>
            </div>

            <div class="lore-footer">
                <p>Vítejte v Kronikách Prázdnoty. Naděje je zde hříchem, který se trestá věčným zapomněním.</p>
            </div>
        </div>
    `;
}

<section class="rules-section">
    <h3>⚔️ BOJOVÉ STATISTIKY</h3>
    <p>Každý Bojovník je definován čtyřmi základními čísly na levé straně karty:</p>
    <ul>
        <li><strong>Z (Zápas):</strong> Schopnost boje zblízka.</li>
        <li><strong>S (Střelba):</strong> Schopnost útoku na dálku.</li>
        <li><strong>O (Obrana):</strong> Odolnost proti zásahu.</li>
        <li><strong>H (Hodnota):</strong> Počet BV, které soupeř získá za zabití této karty. Při vykladání Bojovníka do Družstva jako 1 akci musíš uhradit jeho H v BO.</li>
    </ul>
</section>


            <section class="rules-section">
                <h3>⚠️ SPECIÁLNÍ POJMY</h3>
                <ul>
                    <li><strong>Zraněný:</strong> Karta Bojovníka, která přežila útok, ale je oslabena. Karta se otočí o 90 stupňů. Pokud je zraněna znovu, je bojovník zabit a jde na Hřbitov.</li>
                    <li><strong>Zabit / Obětován:</strong> Karta je vyřazena. Odchází z bojiště na hřbitov.</li>
                    <li><strong>Herní balík:</strong> Vlastnoručně sestavený balík o 60 kartách. Každá karta může být v balíku maximálně 3×, pokud karta výslovně neuvádí jinak. Před začátkem hry musí být herní balík zamíchán.</li>
                </ul>
            </section>

<section class="rules-section">
    <h3>🛡️ HERNÍ ZÓNY</h3>
    <ul>
        <li><strong>Družstvo:</strong> Tvá herní plocha před tebou. Zde jsou všichni tví vyložení Bojovníci. Každá karta Bojovníka v Družstvu může být cílem Zápasu i Střelby, pokud není určeno jinak.</li>
        <li><strong>Ruka:</strong> Na začátku hry si lížeš <strong>7 karet</strong>. Na konci každého svého tahu můžeš z Ruky 1 libovolnou kartu odhodit na Hřbitov. Na začátku každého svého tahu si dolízneš do limitu 7 karet ze svého herního balíku.</li>
        <li><strong>Hřbitov:</strong> Místo pro zabité Bojovníky, použité Taktiky a vyřazené karty ze hry.</li>
        <li><strong>Prázdnota:</strong> Když je Bojovník vyložen v herním poli - družstvu, tak jako 1 akci můžeš přesunout vojáka do Prázdnoty. Otočíš kartu rubem nahoru, spoluhráč na něho nemůže útočit a používat karty na vyložené Bojovníky. Stejně tak ty s ním nemůžeš provést útok, pokud je v Prázdnotě. Jako 1 akci můžeš Prázdnotu opustit a navrátit se do družstva otočením karty.</li>
        <li><strong>Lokace:</strong> Válečná zóna tvého družstva. Karty Lokace upravují podmínky pro tvé družstvo příp. i družstvo spoluhráče, pokud není uvedeno jinak. V jeden okamžik můžeš mít u svého Družstva pouze 1 aktivní Lokaci. Lokaci vkladáš a odhazuješ na Hřbitov jako 1 akci.</li>
    </ul>
</section>

<section class="rules-section">
    <h3>⏳ AKCE A LIMIT ÚTOKU</h3>
    <p>Po dobrání úvodní Ruky se určí začínající hráč následovně: Hru začíná hráč, který má v Ruce nižší počet bojovníků. Při shodě začíná ten hráč, jehož součet hodnot H všech bojovníků v Ruce je nižší.</p>
    <p>Ve svém tahu máš <strong>3 Akce</strong>. Můžeš vykládat karty, používat schopnosti nebo čerpat Body osudu v libovolném pořadí. Jakoukoliv akci můžeš promeditovat (čekáním) a vyděláš tím 1 BO za každou takto strávenou akci, ALE:</p>
    <div class="rules-warning">
        <strong>⚠️ PRAVIDLO POSLEDNÍ KRVE:</strong> Útok (Zápas nebo Střelba) může být proveden pouze jako <strong>poslední akce</strong> v tvém tahu. Jakmile vyhlásíš útok, tvůj tah po jeho vyhodnocení okamžitě končí, i kdybys měl ještě nevyužité akce.
        V prvním kole je útok zakázán. Pokud by spoluhráč neměl Bojovníka ve svém Družstvu, tak můžeš zaútočit přímo na Hráče a získáš tím vítězné body (BV) v hodnotě tvého Bojovníka.
    </div>
</section>

<section class="rules-section">
    <h3>⚔️ PRŮBĚH BOJE</h3>
    <ul>
        <li><strong>Střelba:</strong> Porovnáš svou Střelbu (S) proti Obraně (O) cíle. Úspěch = Zranění.</li>
        <li><strong>Zápas:</strong> Obě strany v Družstvu si vymění rány (Z vs O). Poškození je simultánní.</li>
        <li><strong>Zranění:</strong> První zásah kartu otočí (Zraněná). Druhý zásah ji pošle na Hřbitov.</li>
        <li><strong>Automatické zabití:</strong> Bojovníci co umí automaticky zabíjet vždy zabijí protivníky, které zraní.</li>
    </ul>
</section>

  } from './engine/rulesEngine.js';

  };

  function buildCardDBFromCards(cardsArr) {
    const db = {};
    for (const c of (cardsArr || [])) {
      const id = String(c.id);
      db[id] = { ...c, id };
    }
    return db;
  }

  function initTestGame() {
    if (!window.cards || !Array.isArray(window.cards)) {
      print('❌ window.cards není k dispozici. Zkontroluj, že window.cards = cards je ve tvém <script>.');
      return;
    }

    _inst = 1;
    cardDB = buildCardDBFromCards(window.cards);

    // Test balíky (malé, ale stačí na ověření mechanik):
    // A: Trhač(4), Stínohra(9), Mlha(66)
    // B: Bismarck(22), Dračí střela(67)
    // Auto decks: rozdělíme karty z window.cards mezi hráče a zajistíme alespoň 60 karet
 const ids = (window.cards || []).map(c => String(c.id));
 const rep = (arr, n) => {
   const out = [];
   while (out.length < n && arr.length) {
     for (const x of arr) { out.push(x); if (out.length >= n) break; }
   }
   return out;
 };
 const aIds = rep(ids.slice(0, 40), 60);
 const bIds = rep(ids.slice(40, 80), 60);
 const deckA = aIds.map(id => inst(id));
 const deckB = bIds.map(id => inst(id));


    state = createInitialState({ deckA, deckB, startingBO: 5, targetBV: 20, cardDB });
